[mypy]
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True

# Third-party libraries without complete type stubs
[mypy-pandas.*]
ignore_missing_imports = True

[mypy-sqlmodel.*]
ignore_missing_imports = True

[mypy-python_multipart.*]
ignore_missing_imports = True
